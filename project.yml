name: Dolores
options:
  bundleIdPrefix: com.dolores
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Dolores/Info.plist
    DEVELOPMENT_TEAM: "74P3RP6862"

targets:
  Dolores:
    type: application
    platform: iOS
    sources:
      - path: Dolores
        excludes:
          - "Resources/**"
          - "Info.plist"
      - path: Dolores/Resources/great_wave.mp3
        buildPhase: resources
      - path: Dolores/Resources/wheat_field.mp3
        buildPhase: resources
      - path: Dolores/Resources/great_wave.jpg
        buildPhase: resources
      - path: Dolores/Resources/wheat_field.jpg
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Dolores/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dolores.audioguide
        DEVELOPMENT_TEAM: "74P3RP6862"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Dolores/Dolores.entitlements
