<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Headband arc connecting d and o -->
  <path d="M 112 130 C 112 50, 288 50, 288 130"
        stroke="#e1251b" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Left ear cup - shaped like "d" -->
  <g transform="translate(80, 110)">
    <!-- Ear cup body -->
    <rect x="8" y="10" width="56" height="80" rx="28"
          stroke="#e1251b" stroke-width="6" fill="none"/>
    <!-- d stem -->
    <line x1="64" y1="0" x2="64" y2="90"
          stroke="#e1251b" stroke-width="6" stroke-linecap="round"/>
    <!-- Ear cushion detail -->
    <ellipse cx="36" cy="50" rx="14" ry="22"
             stroke="#e1251b" stroke-width="3" opacity="0.4" fill="none"/>
  </g>

  <!-- Right ear cup - shaped like "o" -->
  <g transform="translate(256, 110)">
    <!-- Ear cup body -->
    <rect x="0" y="10" width="56" height="80" rx="28"
          stroke="#e1251b" stroke-width="6" fill="none"/>
    <!-- Ear cushion detail -->
    <ellipse cx="28" cy="50" rx="14" ry="22"
             stroke="#e1251b" stroke-width="3" opacity="0.4" fill="none"/>
  </g>

  <!-- "lores" text below -->
  <text x="200" y="240"
        font-family="Georgia, serif" font-size="36" font-weight="400"
        fill="#e1251b" text-anchor="middle" letter-spacing="8">
    lores
  </text>

  <!-- Subtle tagline -->
  <text x="200" y="270"
        font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="300"
        fill="#ffffff" opacity="0.5" text-anchor="middle" letter-spacing="4">
    AUDIO GUIDE
  </text>
</svg>
