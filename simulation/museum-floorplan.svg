<svg viewBox="0 0 600 850" xmlns="http://www.w3.org/2000/svg" style="background-color: white;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c" />
    </marker>
  </defs>

  <style>
    .wall { stroke: black; stroke-width: 4; fill: none; stroke-linecap: round; }
    .thin-wall { stroke: black; stroke-width: 2; fill: none; }
    .pathway { stroke: #e74c3c; stroke-width: 3; fill: none; stroke-dasharray: 8,8; marker-end: url(#arrow); }
    .text-label { font-family: sans-serif; font-size: 16px; text-anchor: middle; font-weight: bold; }
    .text-sub { font-family: sans-serif; font-size: 14px; text-anchor: middle; }
    .stairs { stroke: black; stroke-width: 1; }
    .exhibit-circle { fill: white; stroke: black; stroke-width: 2; }
    .exhibit-num { font-family: sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; font-weight: bold;}
  </style>

  <!-- Restrooms -->
  <rect x="420" y="100" width="60" height="40" class="thin-wall" />
  <text x="520" y="125" class="text-sub">Restrooms</text>

  <!-- Store / Café oval -->
  <ellipse cx="300" cy="160" rx="180" ry="70" class="wall" />

  <!-- Entrance / Exit label -->
  <text x="300" y="50" class="text-label" style="font-size: 24px;">ENTRANCE / EXIT</text>

  <!-- Divider in oval -->
  <line x1="300" y1="110" x2="300" y2="190" stroke="black" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Store and Café labels -->
  <text x="210" y="165" class="text-label" style="font-size: 20px;">STORE</text>
  <text x="390" y="165" class="text-label" style="font-size: 20px;">CAFÉ</text>

  <!-- Stairs from entrance -->
  <g transform="translate(260, 210)">
    <rect x="0" y="0" width="80" height="40" fill="none" stroke="black" stroke-width="2"/>
    <line x1="0" y1="10" x2="80" y2="10" class="stairs"/>
    <line x1="0" y1="20" x2="80" y2="20" class="stairs"/>
    <line x1="0" y1="30" x2="80" y2="30" class="stairs"/>
  </g>

  <!-- Vertical corridor walls -->
  <line x1="260" y1="230" x2="260" y2="350" class="wall" />
  <line x1="340" y1="230" x2="340" y2="460" class="wall" />

  <!-- Left outer walls -->
  <polyline points="260,350 100,350 100,750 400,750" class="wall" />
  <!-- Right outer walls -->
  <polyline points="340,460 600,460 600,750 480,750" class="wall" />

  <!-- Bottom stairs -->
  <g transform="translate(400, 750)">
    <rect x="0" y="0" width="80" height="60" fill="none" stroke="black" stroke-width="2"/>
    <line x1="0" y1="10" x2="80" y2="10" class="stairs"/>
    <line x1="0" y1="20" x2="80" y2="20" class="stairs"/>
    <line x1="0" y1="30" x2="80" y2="30" class="stairs"/>
    <line x1="0" y1="40" x2="80" y2="40" class="stairs"/>
    <line x1="0" y1="50" x2="80" y2="50" class="stairs"/>
  </g>

  <!-- Left stairs -->
  <g transform="translate(100, 670)">
    <rect x="0" y="0" width="40" height="60" fill="none" stroke="black" stroke-width="2"/>
    <line x1="0" y1="12" x2="40" y2="12" class="stairs"/>
    <line x1="0" y1="24" x2="40" y2="24" class="stairs"/>
    <line x1="0" y1="36" x2="40" y2="36" class="stairs"/>
    <line x1="0" y1="48" x2="40" y2="48" class="stairs"/>
  </g>

  <!-- Interior walls -->
  <line x1="100" y1="500" x2="180" y2="500" class="wall" />
  <line x1="100" y1="640" x2="220" y2="640" class="wall" />

  <!-- About section walls -->
  <polyline points="280,480 340,480 340,640 300,640" class="wall" fill="none"/>


  <!-- Right interior wall -->
  <line x1="420" y1="610" x2="520" y2="610" class="wall" />

  <!-- Exhibit 1 -->
  <rect x="150" y="360" width="80" height="15" class="thin-wall" />
  <circle cx="200" cy="330" r="15" class="exhibit-circle"/>
  <text x="200" y="331" class="exhibit-num">1</text>

  <!-- Exhibit 2 -->
  <rect x="105" y="400" width="15" height="50" class="thin-wall" />
  <circle cx="80" cy="425" r="15" class="exhibit-circle"/>
  <text x="80" y="426" class="exhibit-num">2</text>

  <!-- Exhibit 3 -->
  <rect x="250" y="490" width="60" height="15" class="thin-wall" />
  <circle cx="280" cy="470" r="15" class="exhibit-circle"/>
  <text x="280" y="471" class="exhibit-num">3</text>

  <!-- Exhibit 4 -->
  <rect x="105" y="560" width="15" height="50" class="thin-wall" />
  <circle cx="80" cy="585" r="15" class="exhibit-circle"/>
  <text x="80" y="586" class="exhibit-num">4</text>

  <!-- Exhibit 5 -->
  <rect x="150" y="630" width="60" height="15" class="thin-wall" />
  <circle cx="150" cy="620" r="15" class="exhibit-circle"/>
  <text x="150" y="621" class="exhibit-num">5</text>

  <!-- Exhibit 6 -->
  <rect x="180" y="740" width="80" height="15" class="thin-wall" />
  <circle cx="220" cy="720" r="15" class="exhibit-circle"/>
  <text x="220" y="721" class="exhibit-num">6</text>

  <!-- Exhibit 7 -->
  <rect x="440" y="740" width="80" height="15" class="thin-wall" />
  <circle cx="480" cy="720" r="15" class="exhibit-circle"/>
  <text x="480" y="721" class="exhibit-num">7</text>

  <!-- Exhibit 8 -->
  <rect x="580" y="660" width="15" height="50" class="thin-wall" />
  <circle cx="620" cy="685" r="15" class="exhibit-circle"/>
  <text x="620" y="686" class="exhibit-num">8</text>

  <!-- Exhibit 9 -->
  <rect x="440" y="600" width="60" height="15" class="thin-wall" />
  <circle cx="480" cy="580" r="15" class="exhibit-circle"/>
  <text x="480" y="581" class="exhibit-num">9</text>

  <!-- Exhibit 10 -->
  <rect x="580" y="530" width="15" height="50" class="thin-wall" />
  <circle cx="630" cy="555" r="15" class="exhibit-circle"/>
  <text x="630" y="556" class="exhibit-num">10</text>

  <!-- Exhibit 11 -->
  <rect x="530" y="470" width="60" height="15" class="thin-wall" />
  <circle cx="580" cy="450" r="15" class="exhibit-circle"/>
  <text x="580" y="451" class="exhibit-num">11</text>

  <!-- Exhibit 12 -->
  <rect x="440" y="470" width="60" height="15" class="thin-wall" />
  <circle cx="420" cy="450" r="15" class="exhibit-circle"/>
  <text x="420" y="451" class="exhibit-num">12</text>

  <!-- Visitor pathway: smooth curved loop staying within open floor space -->
  <path d="M 280,250
           C 280,310 230,350 195,385
           C 150,425 195,470 200,515
           C 210,565 195,615 240,665
           C 290,715 350,725 420,725
           C 500,725 555,685 555,630
           C 555,565 495,535 470,505
           C 445,475 390,465 345,440
           C 325,420 320,350 320,250
           " 
           class="pathway" fill="none" />

</svg>